<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participant Registration</title>
    <link rel="stylesheet" href="form.css">
    <style>
        /* Center the form on the screen for a clean, standalone look */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .standalone-form-wrapper {
            width: 100%;
            max-width: 550px;
        }
        #registration-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #form-submit-btn {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="standalone-form-wrapper">
        <div class="form-container">
            <h3>Student Registration Form</h3>
            <p style="color: #a0aec0; margin-top: 5px; margin-bottom: 25px; font-size: 0.9rem;">
                Please fill in your details to register for the upcoming event.
            </p>
            
            <form id="registration-form">
                <div class="form-group">
                   
                    <input type="text" id="reg-name" placeholder="Enter your full name" required>
                     <label for="reg-name">Full Name</label>
                </div>
                
                <div class="form-group">
                  
                    <input type="email" id="reg-email" placeholder="name@example.com" required>
                      <label for="reg-email">Email Address</label>
                </div>
                
                <div class="form-group">
                    
                    <input type="tel" id="reg-phone" placeholder="Enter 10-digit phone number" pattern="[0-9]{10}" required>
                    <label for="reg-phone">Phone Number</label>
                </div>
                
                <div class="form-group">
                    
                    <input type="text" id="reg-college" placeholder="Enter your college name" required>
                    <label for="reg-college">College / Institution</label>
                </div>
                
               <div class="form-group">
  <select id="reg-category" required>
    <option value="" disabled selected></option>
    <option value="Student">Amitians</option>
    <option value="Guest">Non-Amitians</option>
  </select>
  <label for="reg-category">Category</label>
</div>
                
                <button type="submit" id="form-submit-btn">Submit Registration</button>
            </form>
        </div>
    </div>

    <script>
        // Pure UI logic to handle form submit without a backend database
        document.getElementById("registration-form").addEventListener("submit", (event) => {
            event.preventDefault();

            // Capture input
            const participantData = {
                name: document.getElementById("reg-name").value.trim(),
                email: document.getElementById("reg-email").value.trim(),
                phone: document.getElementById("reg-phone").value.trim(),
                college: document.getElementById("reg-college").value.trim(),
                category: document.getElementById("reg-category").value
            };

            // Logs the data to browser console for verification/hand-off testing
            console.log("Form Submission Received:", participantData);
            
            alert(`Registration successful for ${participantData.name}! Your QR will be generated and shared to you soon via email.`);
            
            event.target.reset();
        });

        document.getElementById("reg-category").addEventListener("change", function() {
  this.classList.toggle("has-value", this.value !== "");
});
    </script>

    
</body>
</html>
