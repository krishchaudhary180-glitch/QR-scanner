<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="form.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="standalone-form-wrapper">
        <div class="form-container">
            <div class="form-content">
                <h3>Student Registration Form</h3>
                <p class="form-description">
                    Please fill in your details to register for the upcoming event.
                </p>

                <form id="registration-form">
                    <div class="form-group full-width">
                        <input type="text" id="reg-name" placeholder=" " required>
                        <label for="reg-name">Full Name</label>
                    </div>

                    <div class="form-group full-width">
                        <input type="email" id="reg-email" placeholder=" " required>
                        <label for="reg-email">Email Address</label>
                    </div>

                    <div class="form-group">
                        <input type="tel" id="reg-phone" placeholder=" " pattern="[0-9]{10}" required>
                        <label for="reg-phone">Phone Number</label>
                    </div>

                    <div class="form-group">
                        <select id="reg-category" required>
                            <option value="" disabled selected hidden></option>
                            <option value="Student">Student</option>
                            <option value="Staff/Faculty">Staff / Faculty</option>
                        </select>
                        <label for="reg-category">Category</label>
                    </div>

                    <div class="form-group full-width">
                        <input type="text" id="reg-college" placeholder=" " required>
                        <label for="reg-college">College / Institution</label>
                    </div>

                    <div class="amitian-status-wrapper">
                        <span class="field-label">Amitian Status</span>
                        <div class="toggle-row">
                            <label class="toggle-pill yes">
                                <input type="radio" name="amitianStatus" value="Yes" required checked>
                                <div class="toggle-track">
                                    <div class="toggle-knob"></div>
                                    <span class="toggle-label-text">Yes</span>
                                </div>
                            </label>
                            <label class="toggle-pill no">
                                <input type="radio" name="amitianStatus" value="No">
                                <div class="toggle-track">
                                    <div class="toggle-knob"></div>
                                    <span class="toggle-label-text">No</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <button type="submit" id="form-submit-btn">Submit Registration</button>
                </form>
            </div>
        </div>
    </div>


<script>
    // 1. DATABASE CONFIGURATION
    const supabaseUrl = 'https://ionwyohuqszattwbrskr.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvbnd5b2h1cXN6YXR0d2Jyc2tyIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTAyMTQxNiwiZXhwIjoyMDk0NTk3NDE2fQ.uiOjWCkeJyN-7x9fAOwFoTSWN648pUWGijSTR9THhCo';
    
    // Initialize Supabase client
    const dbClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    // 2. TOKEN GENERATOR
    function generateUniqueToken() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let token = '';
        for (let i = 0; i < 5; i++) {
            token += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return token;
    }

    // 3. CONSOLIDATED SUBMISSION HANDLER
    document.getElementById('registration-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Get values from inputs
        const fullName = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const category = document.getElementById('reg-category').value;
        const collegeName = document.getElementById('reg-college').value.trim();
        const amitianStatus = document.querySelector('input[name="amitianStatus"]:checked').value;
        const uniqueToken = generateUniqueToken();

        // Push to Supabase
        const { error } = await dbClient
            .from('participants')
            .insert([{ 
                full_name: fullName, 
                email: email, 
                phone: phone,
                Category: category, 
                college_name: collegeName,
                amitian_status: amitianStatus,
                qr_token: uniqueToken 
            }]);

        if (error) {
            console.error('Database Error:', error.message);
            alert('Registration failed: ' + error.message);
        } else {
            alert('Registration Successful! Your unique code is: ' + uniqueToken);
            document.getElementById('registration-form').reset(); 
        }
    });
</script>
</body>
</html>
