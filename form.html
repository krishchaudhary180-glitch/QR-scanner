<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>

    <div class="standalone-form-wrapper">
        <div class="form-container">
            <div class="form-content">
                <h3>Student Registration Form</h3>
                <p class="form-description">
                    Please fill in your details to register for the upcoming event.
                </p>

                <form id="registration-form">
                    <div class="form-group full-width">
                        <input type="text" id="reg-name" placeholder=" " required>
                        <label for="reg-name">Full Name</label>
                    </div>

                    <div class="form-group full-width">
                        <input type="email" id="reg-email" placeholder=" " required>
                        <label for="reg-email">Email Address</label>
                    </div>

                    <div class="form-group">
                        <input type="tel" id="reg-phone" placeholder=" " pattern="[0-9]{10}" required>
                        <label for="reg-phone">Phone Number</label>
                    </div>

                    <div class="form-group">
                        <select id="reg-category" required>
                            <option value="" disabled selected hidden></option>
                            <option value="Student">Student</option>
                            <option value="Staff/Faculty">Staff / Faculty</option>
                        </select>
                        <label for="reg-category">Category</label>
                    </div>

                    <div class="form-group full-width">
                        <input type="text" id="reg-college" placeholder=" " required>
                        <label for="reg-college">College / Institution</label>
                    </div>

                    <div class="amitian-status-wrapper">
                        <span class="field-label">Amitian Status</span>
                        <div class="toggle-row">
                            <label class="toggle-pill yes">
                                <input type="radio" name="amitianStatus" value="Yes" required checked>
                                <div class="toggle-track">
                                    <div class="toggle-knob"></div>
                                    <span class="toggle-label-text">Yes</span>
                                </div>
                            </label>
                            <label class="toggle-pill no">
                                <input type="radio" name="amitianStatus" value="No">
                                <div class="toggle-track">
                                    <div class="toggle-knob"></div>
                                    <span class="toggle-label-text">No</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <button type="submit" id="form-submit-btn">Submit Registration</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registration-form').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevents empty page refresh
            
            // Your exact requested message text
            alert("Your form has been registered and a QR will be provided to you via Mail");
            
            this.reset(); 
        });
    </script>

    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // 3. Handle Form Submission
    // (Replace 'your-form-id' with the actual id attribute of your <form> tag)
    document.getElementById('your-form-id').addEventListener('submit', async (e) => {
      e.preventDefault(); // Prevents the page from refreshing

      // Grab values from your input fields
      // (Replace 'input-id-name' etc. with your actual HTML input IDs)
      const fullName = document.getElementById('input-id-name').value;
      const email = document.getElementById('input-id-email').value;
      const collegeName = document.getElementById('input-id-college').value;
      
      // Auto-generate a simple token format for testing (e.g., ACC26-P-RandomNumber)
      const generatedToken = 'ACC26-P-' + Math.floor(100000 + Math.random() * 900000);

      // Insert data into your Supabase table
      const { data, error } = await supabase
        .from('participants')
        .insert([
          { 
            full_name: fullName, 
            email: email, 
            college_name: collegeName,
            qr_token: generatedToken
          }
        ]);

      if (error) {
        console.error('Error inserting data:', error.message);
        alert('Registration failed: ' + error.message);
      } else {
        alert('Registration Successful! Your token is: ' + generatedToken);
        document.getElementById('your-form-id').reset(); // Clear the form fields
      }
    });
  </script>


</body>
</html>
