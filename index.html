<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <h1>QR Code Scanner Dashboard</h1>
        <p>Track real-time participant check-ins and scans.</p>

        <div class="action-ribbon">
            <div class="filter-section">
                <span class="filter-label">Filter by Event Day:</span>
                <div class="day-selector">
                    <button class="day-btn active" data-day="all">All Days</button>
                    <button class="day-btn" data-day="Day 1">Day 1</button>
                    <button class="day-btn" data-day="Day 2">Day 2</button>
                    <button class="day-btn" data-day="Day 3">Day 3</button>
                </div>
            </div>
        </div>

        <div class="search-section">
            <input type="text" id="search-input" placeholder="🔍 Search by Scan ID or Participant Name...">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Scan ID</th>
                        <th>Participant Name</th>
                        <th>In Time</th>
                        <th>Out Time</th>
                        <th>Event Day</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="log-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="detail-drawer" class="drawer-overlay" onclick="closeDetailDrawer(event)">
        <div class="drawer-content" onclick="event.stopPropagation()">
            <button class="close-drawer-btn" onclick="closeDetailDrawer(false)">&times;</button>
            
            <div class="profile-header">
                <div class="profile-avatar">ID</div>
                <h2 id="drawer-name">Participant Name</h2>
                <p id="drawer-id" style="color: var(--primary); font-family: monospace;">QR-0000</p>
            </div>
            
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
            
            <div class="info-group">
                <label>Email Address</label>
                <p id="drawer-email">N/A</p>
            </div>
            
            <div class="info-group">
                <label>Phone Number</label>
                <p id="drawer-phone">N/A</p>
            </div>
            
            <div class="info-group">
                <label>College / Institution</label>
                <p id="drawer-college">N/A</p>
            </div>
            
            <div class="info-group">
                <label>Category</label>
                <p id="drawer-category">N/A</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
